{% extends 'base.html' %}
{% block content %}
<div class="row g-4"><div class="col-lg-5"><div class="card"><div class="card-body"><h4>{{ 'Edit User' if edit_user else 'Add User' }}</h4><form method="post">{% if edit_user %}<input type="hidden" name="user_id" value="{{ edit_user.id }}">{% endif %}<div class="mb-2"><label class="form-label">Full Name</label><input class="form-control" name="full_name" value="{{ edit_user.full_name if edit_user else '' }}" required></div><div class="mb-2"><label class="form-label">Email</label><input class="form-control" name="email" type="email" value="{{ edit_user.email if edit_user else '' }}" required></div><div class="mb-2"><label class="form-label">Password{% if edit_user %} (optional){% endif %}</label><input class="form-control" name="password" type="password"></div><div class="mb-2"><label class="form-label">Role</label><select class="form-select" name="role"><option {% if edit_user and edit_user.role=='student' %}selected{% endif %}>student</option><option {% if edit_user and edit_user.role=='faculty' %}selected{% endif %}>faculty</option><option {% if edit_user and edit_user.role=='manager' %}selected{% endif %}>manager</option></select></div><div class="mb-2"><label class="form-label">Section</label><input class="form-control" name="section" value="{{ edit_user.section if edit_user else '' }}"></div><div class="mb-2"><label class="form-label">Specialization</label><input class="form-control" name="specialization" value="{{ edit_user.specialization if edit_user else '' }}"></div><div class="mb-3"><label class="form-label">Status</label><select class="form-select" name="status"><option value="active">active</option><option value="inactive" {% if edit_user and edit_user.status=='inactive' %}selected{% endif %}>inactive</option></select></div><button class="btn btn-primary">Save User</button></form></div></div></div><div class="col-lg-7"><div class="card"><div class="card-body"><h4>Users</h4><table class="table"><thead><tr><th>Name</th><th>Role</th><th>Email</th><th>Status</th><th></th></tr></thead><tbody>{% for u in users %}<tr><td>{{ u.full_name }}</td><td>{{ u.role }}</td><td>{{ u.email }}</td><td>{{ u.status }}</td><td><a class="btn btn-sm btn-outline-primary" href="{{ url_for('manager_users', edit=u.id) }}">Edit</a> <a class="btn btn-sm btn-outline-danger" href="{{ url_for('manager_delete_user', user_id=u.id) }}">Delete</a></td></tr>{% endfor %}</tbody></table></div></div></div></div>
{% endblock %}
