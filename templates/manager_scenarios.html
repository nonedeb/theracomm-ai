{% extends 'base.html' %}
{% block content %}
<div class="row g-4"><div class="col-lg-5"><div class="card"><div class="card-body"><h4>{{ 'Edit Scenario' if edit_scenario else 'Add Scenario' }}</h4><form method="post">{% if edit_scenario %}<input type="hidden" name="scenario_id" value="{{ edit_scenario.id }}">{% endif %}<div class="mb-2"><input class="form-control" name="title" placeholder="Title" value="{{ edit_scenario.title if edit_scenario else '' }}" required></div><div class="mb-2"><select class="form-select" name="scenario_type"><option value="chat" {% if edit_scenario and edit_scenario.scenario_type=='chat' %}selected{% endif %}>chat</option><option value="decision" {% if edit_scenario and edit_scenario.scenario_type=='decision' %}selected{% endif %}>decision</option></select></div><div class="mb-2"><input class="form-control" name="category" placeholder="Category" value="{{ edit_scenario.category if edit_scenario else '' }}" required></div><div class="mb-2"><input class="form-control" name="patient_name" placeholder="Patient name" value="{{ edit_scenario.patient_name if edit_scenario else '' }}" required></div><div class="mb-2"><input class="form-control" name="patient_age" placeholder="Patient age" value="{{ edit_scenario.patient_age if edit_scenario else '' }}"></div><div class="mb-2"><input class="form-control" name="emotional_state" placeholder="Emotional state" value="{{ edit_scenario.emotional_state if edit_scenario else '' }}" required></div><div class="mb-2"><textarea class="form-control" name="clinical_context" rows="2" placeholder="Clinical context">{{ edit_scenario.clinical_context if edit_scenario else '' }}</textarea></div><div class="mb-2"><textarea class="form-control" name="opening_statement" rows="2" placeholder="Opening statement">{{ edit_scenario.opening_statement if edit_scenario else '' }}</textarea></div><div class="mb-2"><select class="form-select" name="difficulty"><option>Beginner</option><option>Intermediate</option><option>Advanced</option></select></div><div class="mb-2"><textarea class="form-control" name="choices" rows="4" placeholder="For decision items: one choice per line">{% if edit_scenario and edit_scenario.choices_json %}{{ '\n'.join(json.loads(edit_scenario.choices_json)) }}{% endif %}</textarea></div><div class="mb-2"><input class="form-control" name="correct_choice" placeholder="Correct choice index (0-based)" value="{{ edit_scenario.correct_choice if edit_scenario and edit_scenario.correct_choice is not none else '' }}"></div><div class="mb-2"><textarea class="form-control" name="rationale" rows="2" placeholder="Rationale">{{ edit_scenario.rationale if edit_scenario else '' }}</textarea></div><div class="mb-2"><input class="form-control" name="source_type" placeholder="Source type" value="{{ edit_scenario.source_type if edit_scenario else 'manager' }}"></div><div class="form-check mb-3"><input class="form-check-input" type="checkbox" name="is_active" {% if not edit_scenario or edit_scenario.is_active %}checked{% endif %}><label class="form-check-label">Active</label></div><button class="btn btn-primary">Save Scenario</button></form></div></div></div><div class="col-lg-7"><div class="card"><div class="card-body"><h4>Scenarios</h4><table class="table"><thead><tr><th>Title</th><th>Type</th><th>Category</th><th></th></tr></thead><tbody>{% for s in scenarios %}<tr><td>{{ s.title }}</td><td>{{ s.scenario_type }}</td><td>{{ s.category }}</td><td><a class="btn btn-sm btn-outline-primary" href="{{ url_for('manager_scenarios', edit=s.id) }}">Edit</a> <a class="btn btn-sm btn-outline-danger" href="{{ url_for('manager_delete_scenario', scenario_id=s.id) }}">Delete</a></td></tr>{% endfor %}</tbody></table></div></div></div></div>
{% endblock %}
