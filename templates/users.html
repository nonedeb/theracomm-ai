{% extends 'base.html' %}
{% block content %}
<div class="row g-4">
  <div class="col-md-5">
    <div class="card p-3">
      <h4>Create User</h4>
      <form method="post">
        <input class="form-control mb-2" name="full_name" placeholder="Full name" required>
        <input class="form-control mb-2" name="email" type="email" placeholder="Email" required>
        <input class="form-control mb-2" name="password" type="password" placeholder="Password" required>
        <select class="form-select mb-2" name="role">
          <option value="student">Student</option>
          <option value="faculty">Faculty</option>
          <option value="manager">Manager</option>
        </select>
        <input class="form-control mb-2" name="section" placeholder="Section">
        <input class="form-control mb-3" name="specialization" placeholder="Specialization">
        <button class="btn btn-primary">Create</button>
      </form>
    </div>
  </div>
  <div class="col-md-7">
    <div class="card p-3">
      <h4>Users</h4>
      <div class="table-responsive"><table class="table"><thead><tr><th>Name</th><th>Email</th><th>Role</th></tr></thead><tbody>
        {% for u in users %}
        <tr><td>{{ u.full_name }}</td><td>{{ u.email }}</td><td>{{ u.role }}</td></tr>
        {% else %}<tr><td colspan="3" class="text-muted">No users found.</td></tr>{% endfor %}
      </tbody></table></div>
    </div>
  </div>
</div>
{% endblock %}
