{% extends 'base.html' %}
{% block content %}
<div class="row g-4">
  <div class="col-lg-4">
    <div class="card p-4">
      <h4>Add User</h4>
      <form method="post">
        <div class="mb-3"><label class="form-label">Full Name</label><input class="form-control" name="full_name" required></div>
        <div class="mb-3"><label class="form-label">Email</label><input class="form-control" type="email" name="email" required></div>
        <div class="mb-3"><label class="form-label">Password</label><input class="form-control" type="password" name="password" required></div>
        <div class="mb-3"><label class="form-label">Role</label>
          <select class="form-select" name="role"><option>student</option><option>faculty</option><option>manager</option></select>
        </div>
        <div class="mb-3"><label class="form-label">Section</label><input class="form-control" name="section"></div>
        <div class="mb-3"><label class="form-label">Specialization</label><input class="form-control" name="specialization"></div>
        <button class="btn btn-primary w-100" type="submit">Create User</button>
      </form>
    </div>
  </div>
  <div class="col-lg-8">
    <div class="card p-4">
      <h4>Users</h4>
      <div class="table-responsive">
        <table class="table">
          <thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Status</th></tr></thead>
          <tbody>
          {% for user in users %}
            <tr>
              <td>{{ user.full_name }}</td>
              <td>{{ user.email }}</td>
              <td>{{ user.role }}</td>
              <td>{{ user.status }}</td>
            </tr>
          {% endfor %}
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
{% endblock %}
