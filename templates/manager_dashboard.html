{% extends 'base.html' %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <div>
    <h2>Manager Dashboard</h2>
    <p class="text-muted mb-0">Manage users and monitor platform activity.</p>
  </div>
  <a class="btn btn-primary" href="{{ url_for('users_page') }}">Manage Users</a>
</div>
<div class="row g-4">
  <div class="col-md-4"><div class="card p-3"><h6>Users</h6><div class="display-6">{{ users|length }}</div></div></div>
  <div class="col-md-4"><div class="card p-3"><h6>Scenarios</h6><div class="display-6">{{ scenarios|length }}</div></div></div>
  <div class="col-md-4"><div class="card p-3"><h6>Attempts</h6><div class="display-6">{{ attempts }}</div></div></div>
</div>
{% endblock %}
