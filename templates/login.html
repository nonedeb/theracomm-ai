{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card hero-card p-4">
      <h2 class="mb-2">Login</h2>
      <p class="text-muted">Use the demo accounts or your registered account.</p>
      <form method="post">
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input class="form-control" type="email" name="email" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input class="form-control" type="password" name="password" required>
        </div>
        <button class="btn btn-primary w-100" type="submit">Login</button>
      </form>
      <hr>
      <small class="text-muted">
        Student: student@theracomm.ai / Student123!<br>
        Faculty: faculty@theracomm.ai / Faculty123!<br>
        Manager: manager@theracomm.ai / Manager123!
      </small>
    </div>
  </div>
</div>
{% endblock %}
