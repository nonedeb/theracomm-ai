{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card p-4">
      <h2 class="mb-2">Sign in</h2>
      <p class="text-muted">Therapeutic communication training and analytics platform.</p>
      <form method="post">
        <div class="mb-3"><label class="form-label">Email</label><input class="form-control" name="email" required></div>
        <div class="mb-3"><label class="form-label">Password</label><input class="form-control" type="password" name="password" required></div>
        <button class="btn btn-primary w-100">Login</button>
      </form>
      <div class="mt-3 small-muted">Run <code>/init-db</code> once after deployment.</div>
    </div>
  </div>
</div>
{% endblock %}
