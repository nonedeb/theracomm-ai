{% extends 'base.html' %}
{% block content %}
<div class="card p-3">
  <h2>My Results</h2>
  <div class="table-responsive mt-3"><table class="table"><thead><tr><th>Date</th><th>Scenario</th><th>Response</th><th>Score</th></tr></thead><tbody>
    {% for a in attempts %}
    <tr>
      <td>{{ a.created_at.strftime('%Y-%m-%d %H:%M') }}</td>
      <td>{{ a.scenario.title }}</td>
      <td>{{ a.student_response }}</td>
      <td>{{ a.score }}</td>
    </tr>
    <tr><td></td><td colspan="3" class="text-muted">{{ a.ai_feedback }}</td></tr>
    {% else %}
    <tr><td colspan="4" class="text-muted">No attempts yet.</td></tr>
    {% endfor %}
  </tbody></table></div>
</div>
{% endblock %}
