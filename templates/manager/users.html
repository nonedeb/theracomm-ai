{% extends "base.html" %}{% block content %}
<h2 class="fw-bold mb-4">Users</h2>
<div class="card border-0 shadow-sm rounded-4"><div class="card-body">
<table class="table table-hover"><thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Status</th></tr></thead><tbody>
{% for u in users %}<tr><td>{{ u.name }}</td><td>{{ u.email }}</td><td>{{ u.role }}</td><td>{{ u.status }}</td></tr>{% else %}<tr><td colspan="4" class="text-center text-muted">No users found.</td></tr>{% endfor %}
</tbody></table></div></div>
{% endblock %}
