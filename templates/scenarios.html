{% extends 'base.html' %}
{% block content %}
<div class="card p-3">
  <h2>Scenarios</h2>
  <div class="list-group list-group-flush mt-3">
    {% for s in scenarios %}
    <div class="list-group-item">
      <div class="fw-semibold">{{ s.title }}</div>
      <div class="text-muted small">{{ s.category }} · {{ s.patient_name }} · {{ s.difficulty }}</div>
      <div class="mt-1">{{ s.opening_statement }}</div>
    </div>
    {% else %}
    <div class="text-muted">No scenarios available.</div>
    {% endfor %}
  </div>
</div>
{% endblock %}
