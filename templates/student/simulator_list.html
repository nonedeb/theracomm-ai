{% extends "base.html" %}{% block content %}
<h2 class="fw-bold mb-4">AI Patient Simulator</h2>
<div class="row g-4">
{% for sc in scenarios %}
<div class="col-lg-6"><div class="card border-0 shadow-sm rounded-4"><div class="card-body">
  <div class="d-flex justify-content-between align-items-start mb-2"><h5>{{ sc.title }}</h5><span class="soft-badge">{{ sc.difficulty }}</span></div>
  <p class="text-muted mb-2">{{ sc.clinical_context }}</p>
  <div class="small mb-3"><strong>Patient:</strong> {{ sc.patient_name }}, {{ sc.patient_age }} • {{ sc.emotional_state }}</div>
  <a href="{{ url_for('student_simulator_chat', scenario_id=sc.id) }}" class="btn btn-primary rounded-3">Open Scenario</a>
</div></div></div>
{% endfor %}
</div>
{% endblock %}
