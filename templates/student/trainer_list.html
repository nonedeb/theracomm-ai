{% extends "base.html" %}{% block content %}
<h2 class="fw-bold mb-4">Scenario-Based Decision Trainer</h2>
<div class="row g-4">
{% for sc in scenarios %}
<div class="col-lg-6"><div class="card border-0 shadow-sm rounded-4"><div class="card-body">
  <div class="d-flex justify-content-between align-items-start mb-2"><h5>{{ sc.title }}</h5><span class="soft-badge">{{ sc.category }}</span></div>
  <p class="mb-2">{{ sc.opening_statement }}</p>
  <a class="btn btn-primary rounded-3" href="{{ url_for('student_trainer_detail', scenario_id=sc.id) }}">Open Trainer</a>
</div></div></div>
{% endfor %}
</div>
{% endblock %}
