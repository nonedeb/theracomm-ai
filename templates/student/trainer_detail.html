{% extends "base.html" %}{% block content %}
<h2 class="fw-bold mb-4">{{ scenario.title }}</h2>
<div class="card border-0 shadow-sm rounded-4"><div class="card-body">
  <p><strong>Patient statement:</strong> {{ scenario.opening_statement }}</p>
  <form method="POST">
    {% for c in choices %}
    <div class="form-check mb-3 p-3 rounded-4 border">
      <input class="form-check-input" type="radio" name="choice_id" value="{{ c.id }}" id="choice{{ c.id }}" required>
      <label class="form-check-label" for="choice{{ c.id }}">{{ c.choice_text }}</label>
    </div>
    {% endfor %}
    <button class="btn btn-primary rounded-3">Submit Answer</button>
  </form>
</div></div>
{% endblock %}
