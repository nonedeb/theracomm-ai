{% extends 'base.html' %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3"><h2>Chat Session</h2><a href="{{ url_for('student_dashboard') }}" class="btn btn-outline-secondary btn-sm">Back</a></div>
<div class="row g-3">
{% for s in scenarios %}
<div class="col-md-6 col-lg-4"><div class="card h-100"><div class="card-body"><h5>{{ s.title }}</h5><div class="small-muted mb-2">{{ s.category }} · {{ s.difficulty }}</div><p>{{ s.clinical_context }}</p><a href="{{ url_for('simulator', scenario_id=s.id) }}" class="btn btn-primary">Open Chat</a></div></div></div>
{% endfor %}
</div>
{% endblock %}
