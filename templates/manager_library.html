{% extends 'base.html' %}
{% block content %}
<div class="row g-4"><div class="col-lg-5"><div class="card"><div class="card-body"><h4>Library Bank Upload</h4><p class="small-muted">Optional reference bank for scenario inspiration.</p><form method="post" enctype="multipart/form-data"><div class="mb-2"><input class="form-control" name="title" placeholder="Title" required></div><div class="mb-2"><textarea class="form-control" name="description" rows="3" placeholder="Description"></textarea></div><div class="mb-3"><input class="form-control" type="file" name="file" required></div><button class="btn btn-primary">Upload</button></form></div></div></div><div class="col-lg-7"><div class="card"><div class="card-body"><h4>Uploaded Files</h4><table class="table"><thead><tr><th>Title</th><th>File</th><th>Date</th></tr></thead><tbody>{% for f in files %}<tr><td>{{ f.title }}</td><td>{{ f.filename }}</td><td>{{ f.created_at.strftime('%Y-%m-%d') }}</td></tr>{% else %}<tr><td colspan="3">No files uploaded.</td></tr>{% endfor %}</tbody></table></div></div></div></div>
{% endblock %}
